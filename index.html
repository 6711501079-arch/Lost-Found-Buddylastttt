<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found Buddy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-full w-full">
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="app-shell" id="appShell">
        <nav class="top-navbar" role="navigation" aria-label="Main navigation">
            <div class="app-logo">
                <div class="app-logo-icon">🔎</div>
                <span class="app-logo-text">Lost & Found Buddy</span>
            </div>
            <div class="nav-actions">
                <button class="notif-btn" id="notifBtn" aria-label="Notifications">
                    <i class="bi bi-bell-fill" style="font-size:18px;"></i>
                    <span class="notif-badge"></span>
                </button>
                <div class="avatar-btn" id="avatarBtn">N</div>
            </div>
        </nav>

        <main>
            <section class="welcome-section" aria-label="Welcome">
                <h1 class="greeting-text" id="greetingText">สวัสดี 👋</h1>
                <p class="subtitle-text" id="subtitleText">คุณต้องการแจ้งของหายหรือพบของ?</p>
            </section>

            <section class="action-buttons" aria-label="Main actions">
                <button class="action-card action-lost" id="btnLost">
                    <span class="action-emoji">🔍</span>
                    <span class="action-label">แจ้งของหาย</span>
                    <span class="action-sublabel">Lost Item</span>
                </button>
                <button class="action-card action-found" id="btnFound">
                    <span class="action-emoji">📦</span>
                    <span class="action-label">แจ้งของที่พบ</span>
                    <span class="action-sublabel">Found Item</span>
                </button>
            </section>

            <section class="search-section" aria-label="Search">
                <div class="search-wrapper">
                    <input type="text" class="search-input" id="searchInput" placeholder="ค้นหาของหายหรือของที่พบ...">
                    <i class="bi bi-search"></i>
                </div>
            </section>

            <section class="chips-section" aria-label="Categories">
                <div class="chips-scroll" id="chipsContainer" role="tablist">
                    <button class="chip active" data-category="all">🏷️ ทั้งหมด</button>
                    <button class="chip" data-category="electronics">📱 อิเล็กทรอนิกส์</button>
                    <button class="chip" data-category="bags">👜 กระเป๋า</button>
                    <button class="chip" data-category="cards">💳 บัตร</button>
                    <button class="chip" data-category="jewelry">💍 เครื่องประดับ</button>
                    <button class="chip" data-category="keys">🔑 กุญแจ</button>
                    <button class="chip" data-category="other">📎 อื่น ๆ</button>
                </div>
            </section>

            <div class="section-header">
                <h2 class="section-title">โพสต์ล่าสุด</h2>
                <a class="section-link" id="seeAllLink">ดูทั้งหมด →</a>
            </div>
            <section class="cards-container" id="cardsContainer"></section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" id="navHome">
                <i class="bi bi-house-fill"></i>
                <span>หน้าหลัก</span>
            </button>
            <button class="nav-add-btn" id="navAdd">
                <i class="bi bi-plus-lg"></i>
            </button>
            <button class="nav-item" id="navProfile">
                <i class="bi bi-person-fill"></i>
                <span>โปรไฟล์</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
