<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found Buddy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="h-full w-full">
    <div class="ambient-glow"></div>

    <div class="app-shell">
        <nav class="top-navbar">
            <div class="flex items-center gap-2">
                <div class="app-logo-icon">🔎</div>
                <span class="app-logo-text">Lost & Found Buddy</span>
            </div>
            <div class="nav-actions flex items-center gap-3">
                <i class="bi bi-bell text-xl"></i>
                <div class="avatar-btn">N</div>
            </div>
        </nav>

        <main>
            <section class="px-6 pt-6">
                <h1 class="text-2xl font-bold">สวัสดี 👋</h1>
                <p class="text-gray-400 text-sm">คุณต้องการแจ้งของหายหรือพบของ?</p>
            </section>

            <section class="flex gap-4 px-6 mt-6">
                <button class="action-card action-lost" id="btnLost">
                    <span class="text-2xl block mb-1">🔍</span>
                    <span class="font-bold">แจ้งของหาย</span>
                    <span class="text-[10px] opacity-80 block">LOST ITEM</span>
                </button>
                <button class="action-card action-found" id="btnFound">
                    <span class="text-2xl block mb-1">📦</span>
                    <span class="font-bold">แจ้งของที่พบ</span>
                    <span class="text-[10px] opacity-80 block">FOUND ITEM</span>
                </button>
            </section>

            <section class="px-6 mt-6">
                <div class="relative">
                    <i class="bi bi-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="ค้นหาของหาย...">
                </div>
            </section>

            <section class="mt-6 overflow-x-auto no-scrollbar">
                <div class="flex gap-2 px-6" id="chipsContainer">
                    <button class="chip active" data-category="all">🏷️ ทั้งหมด</button>
                    <button class="chip" data-category="electronics">📱 มือถือ</button>
                    <button class="chip" data-category="bags">👜 กระเป๋า</button>
                </div>
            </section>

            <div class="px-6 mt-8 flex justify-between items-center">
                <h2 class="font-bold">โพสต์ล่าสุด</h2>
                <span class="text-xs text-purple-400">ดูทั้งหมด →</span>
            </div>
            
            <section class="px-6 mt-4 pb-24" id="cardsContainer">
                </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active"><i class="bi bi-house-fill"></i><span>หน้าหลัก</span></button>
            <button class="nav-add-btn" id="navAdd"><i class="bi bi-plus-lg"></i></button>
            <button class="nav-item"><i class="bi bi-person-fill"></i><span>โปรไฟล์</span></button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
